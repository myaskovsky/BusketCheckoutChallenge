<input
  id="card-number"
  class="card-input"
  [class.invalid]="invalid()"
  [value]="display()"
  [disabled]="disabled()"
  (input)="onInput($event)"
  (blur)="markTouched()"
  inputmode="numeric"
  autocomplete="cc-number"
  maxlength="19"
  placeholder="1234 5678 9012 3456"
  aria-describedby="card-error"
  data-testid="card-number-input"
/>
