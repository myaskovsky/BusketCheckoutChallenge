<div class="name">
  <span class="product-name" data-testid="line-product-name">{{ item().product.name }}</span>
  <span class="unit-price" data-testid="line-unit-price">{{ item().product.price | currency }} each</span>
</div>

<mat-form-field appearance="outline" class="quantity-field" subscriptSizing="dynamic">
  <mat-label>Qty</mat-label>
  <mat-select
    [value]="item().quantity"
    (selectionChange)="onQuantityChange($event.value)"
    [attr.aria-label]="'Quantity for ' + item().product.name"
    data-testid="quantity-select"
  >
    @for (option of quantities(); track option) {
      <mat-option [value]="option">{{ option }}</mat-option>
    }
  </mat-select>
</mat-form-field>

<span class="line-total" data-testid="line-total">{{ lineTotal() | currency }}</span>

<button matButton type="button" (click)="removeAll.emit()" data-testid="remove-all">Remove all</button>
